name: Test Murkit Feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packages
        run: npm install

      - name: Run Murkit script
        run: node murkit.js

      - name: Commit generated feed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add offers-response.json
          git commit -m "Update offers feed" || echo "No changes to commit"
          git push
